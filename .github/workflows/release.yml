name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64

      - name: Build
        run: |
          cargo build --release --bin obs-hotkey --target x86_64-unknown-linux-gnu
          mv target/x86_64-unknown-linux-gnu/release/obs-hotkey \
             target/x86_64-unknown-linux-gnu/release/obs-hotkey-x86_64-unknown-linux-gnu

      - run: strip target/x86_64-unknown-linux-gnu/release/obs-hotkey-x86_64-unknown-linux-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: obs-hotkey-amd64
          path: target/x86_64-unknown-linux-gnu/release/obs-hotkey-x86_64-unknown-linux-gnu

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64

      - name: Install cross-toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          cargo build --release --bin obs-hotkey --target aarch64-unknown-linux-gnu
          mv target/aarch64-unknown-linux-gnu/release/obs-hotkey \
             target/aarch64-unknown-linux-gnu/release/obs-hotkey-aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - run: aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/obs-hotkey-aarch64-unknown-linux-gnu

      - uses: actions/upload-artifact@v4
        with:
          name: obs-hotkey-arm64
          path: target/aarch64-unknown-linux-gnu/release/obs-hotkey-aarch64-unknown-linux-gnu

  release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish to crates.io
        uses: crate-ci/typos@v1
        with:
          registry: v2

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          files: |
            artifacts/obs-hotkey-x86_64-unknown-linux-gnu
            artifacts/obs-hotkey-aarch64-unknown-linux-gnu
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
